<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luis H's Academic Portfolio</title>
    <link rel="icon" type="image/png" href="https://horlogica.com/wp-content/uploads/2023/02/cropped-favicon-horlogica.png" />
    <link rel="preload" as="image" href="https://ourwyskhfdesnmnhlxof.supabase.co/storage/v1/object/public/Photos/uandes_2.jpg" />
    <script>
      // GitHub Pages SPA redirect restoration
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body class="bg-zinc-50 text-brand-dark antialiased">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
